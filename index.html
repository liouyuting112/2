    body {

      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-decor::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 140, 107, 0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
    }

    .bg-decor::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(197, 163, 255, 0.1) 0%, transparent 70%);
      bottom: -50px;
      left: -80px;
      border-radius: 50%;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    /* ===== PAWS FLOATING ===== */
    .paw-float {
      position: fixed;
      font-size: 28px;
      opacity: 0.08;
      animation: floatPaw 12s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .paw-float:nth-child(1) {
      top: 10%;
      left: 5%;
      animation-delay: 0s;
    }

    .paw-float:nth-child(2) {
      top: 30%;
      right: 8%;
      animation-delay: 3s;
      font-size: 22px;
    }

    .paw-float:nth-child(3) {
      top: 60%;
      left: 10%;
      animation-delay: 6s;
      font-size: 34px;
    }

    .paw-float:nth-child(4) {
      top: 80%;
      right: 12%;
      animation-delay: 9s;
    }

    @keyframes floatPaw {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(15deg);
      }
    }

    /* ===== START SCREEN ===== */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeUp 0.45s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .start-screen {
      text-align: center;
      padding-top: 12vh;
    }

    .cat-hero {
      font-size: 96px;
      line-height: 1;
      margin-bottom: 8px;
      animation: catBounce 2s ease-in-out infinite;
    }

    @keyframes catBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .start-screen h1 {
      font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--lavender));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-screen .subtitle {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255, 140, 107, 0.35);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(255, 140, 107, 0.45);
    }

    .btn-start:hover::after {
      opacity: 1;
    }

    .btn-start:active {
      transform: translateY(0);
    }

    /* ===== QUIZ SCREEN ===== */
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #EDE4DD;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;

    .btn-back:hover {
      border-color: var(--primary);
      background: #FFF0EB;
    }

    .progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #F0E6DE;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);

    .question-card {
      background: var(--card);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(237, 228, 221, 0.6);
    }

    .q-emoji {
      font-size: 48px;
      text-align: center;
      margin-bottom: 16px;
    }

    .q-text {
      font-size: 19px;
      font-weight: 700;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 16px 20px;
      border-radius: 16px;
      border: 2px solid #F0E6DE;
      background: var(--card);
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1.5;
      position: relative;
      overflow: hidden;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 140, 107, 0.06), rgba(197, 163, 255, 0.06));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .option-btn:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255, 140, 107, 0.12);
    }

    .option-btn:hover::before {
      opacity: 1;
    }

    .option-btn:active {
      transform: translateY(0);
    }

    .option-btn.selected {
      border-color: var(--primary);
      background: #FFF0EB;
      font-weight: 600;
    }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      text-align: center;
      padding-top: 6vh;
    }

    .result-card {
      background: var(--card);
      border-radius: 28px;
      padding: 36px 24px 32px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(237, 228, 221, 0.5);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--lavender), var(--mint));
    }

    .result-emoji {
      font-size: 80px;
      margin-bottom: 12px;
    }

    .result-type-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .result-title {
      font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .result-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .result-meter {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #FFF8F0;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 8px;
    }

    .meter-label {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meter-bar {
      flex: 1;
      height: 12px;
      background: #F0E6DE;
      border-radius: 99px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .meter-fill.love {
      background: linear-gradient(90deg, var(--pink), #FF6B8A);
    }

    .meter-percent {
      font-size: 20px;
      font-weight: 900;
      color: var(--primary);
      min-width: 52px;
      text-align: right;
    }

    .share-section {
      margin-top: 24px;
    }

    .share-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    .share-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 36px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #fff;
      width: 100%;
      max-width: 320px;
    }

    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 140, 107, 0.3);
    }

    .share-btn:active {
      transform: translateY(0);
    }

    .share-btn.native {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    .share-btn.copy {
      background: var(--text);
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 14px 36px;
      border-radius: 60px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-retry:hover {
      background: var(--primary);
      color: #fff;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .start-screen h1 {
        font-size: 24px;
      }

      .q-text {
        font-size: 17px;
      }

      .result-title {
        font-size: 22px;
      }

      .share-btns {
        gap: 8px;
      }

      .share-btn {
        padding: 10px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>

  <div class="toast" id="toast">已複製連結！</div>

          { text: '會把自己的毛留在你所有黑色衣服上（算嗎）', score: 2 }

        ]
      },
      {

        text: '晚上睡覺時，貓咪會？',
        options: [

          { text: '睡在床尾，離你一段距離', score: 3 },
          { text: '凌晨三點在你臉上踩來踩去', score: 2 },
          { text: '自己去別的地方睡，不跟你擠', score: 1 }
        ]
      },
      {
        emoji: '🫳',
        text: '你伸手要摸貓咪時，牠的反應是？',
        options: [
          { text: '翻肚讓你摸，開心呼嚕', score: 4 },
          { text: '讓你摸三秒然後咬你', score: 2 },

    const results = [
      {
        min: 8, max: 13,
        emoji: '😿',
        title: '透明鏟屎官',
        desc: '在喵主子心中，你大概跟自動餵食器差不多等級...不對，餵食器可能還比你有存在感。但別氣餒！貓咪的愛需要時間，持續提供罐罐和溫暖的陪伴，總有一天牠會多看你一眼的（大概）。',
        love: 20

      {
        min: 14, max: 19,
        emoji: '😼',
        title: '合格工具人',
        desc: '恭喜你！你已經從「陌生人」升級為「還算有用的人類」了。喵主子雖然嘴上不說，但肚子餓的時候第一個想到的就是你，這也算一種愛吧？繼續努力表現，說不定哪天能升等為「指定陪睡員」。',
        love: 45

      {

        emoji: '😸',
        title: '認證貓奴',
        desc: '你在喵主子心中有一定地位了！牠願意在你旁邊待著，偶爾還會賞你一個呼嚕，這在貓界可是很大的恩典了。你就是那種會被貓咪選中坐大腿、但稍微動一下就會被瞪的幸福奴才。',
        love: 72

      {

        emoji: '😻',
        title: '喵主子的真愛',
        desc: '太驚人了！你家貓咪居然真的喜歡你！牠對你眨眼、蹭你、甚至願意翻肚皮——這在貓的世界裡等於求婚了。你一定是上輩子拯救了整間貓咖啡廳，這輩子才能得到如此殊榮。請珍惜這份跨物種的愛！',

    let currentQ = 0;
    let answers = [];

    function startQuiz() {
      currentQ = 0;
      answers = [];
      showScreen('quiz');
      renderQuestion();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestion() {
      const q = questions[currentQ];
      document.getElementById('qEmoji').textContent = q.emoji;
      document.getElementById('qText').textContent = q.text;
      document.getElementById('progLabel').textContent = `第 ${currentQ + 1} / ${questions.length} 題`;
      document.getElementById('progFill').style.width = `${((currentQ) / questions.length) * 100}%`;
      document.getElementById('backBtn').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

      const wrap = document.getElementById('optionsWrap');
      wrap.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        if (answers[currentQ] === i) btn.classList.add('selected');
        btn.onclick = () => selectOption(i);
        wrap.appendChild(btn);
      });
    }

    function selectOption(idx) {
      answers[currentQ] = idx;

      // brief highlight
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((b, i) => b.classList.toggle('selected', i === idx));

      setTimeout(() => {
        if (currentQ < questions.length - 1) {
          currentQ++;
          renderQuestion();
        } else {
          showResult();
        }
      }, 300);
    }

    function prevQuestion() {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
      }
    }

    function showResult() {
      let total = 0;
      answers.forEach((ans, qi) => {
        total += questions[qi].options[ans].score;
      });

      const r = results.find(r => total >= r.min && total <= r.max) || results[results.length - 1];
      const shareText = `我測出來是「${r.title}」！喵主子對我的喜愛度只有 ${r.love}%... 😹 你家貓咪喜歡你嗎？快來測測看！`;
      const shareUrl = window.location.href;

      const el = document.getElementById('result');
      el.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-type-label">你的貓奴類型</div>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="result-meter">
        <span class="meter-label">喵主子喜愛度</span>
        <div class="meter-bar"><div class="meter-fill love" id="loveMeter" style="width:0%"></div></div>
        <span class="meter-percent">${r.love}%</span>
      </div>
    </div>

    <div class="share-section">
      <div class="share-title">分享給朋友一起測 🐾</div>
      <div class="share-btns">
        ${navigator.share ? `<button class="share-btn native" onclick="nativeShare()">📤 分享給朋友</button>` : ''}
        <button class="share-btn copy" onclick="copyLink()">📋 複製結果 + 連結</button>
      </div>
    </div>

    <button class="btn-retry" onclick="startQuiz()">🔄 再測一次</button>
  `;

      showScreen('result');

      // animate meter
      setTimeout(() => {
        document.getElementById('loveMeter').style.width = r.love + '%';
      }, 400);

      // store for share
      window._shareText = shareText;
      window._shareUrl = shareUrl;
    }

    function nativeShare() {
      if (navigator.share) {
        navigator.share({
          title: '喵主子真的喜歡你嗎？貓奴忠誠度測驗',
          text: window._shareText,
          url: window._shareUrl
        }).catch(() => { });
      }
    }

    function copyLink() {
      const text = window._shareText + '\n' + window._shareUrl;
      navigator.clipboard.writeText(text).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
      });
    }
  </script>
